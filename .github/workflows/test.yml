name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2


      - name: Run unit tests
        run: cargo test
