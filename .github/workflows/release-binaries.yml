name: Native Binary Release

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build from (for example: v1.7.2)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  native-binaries:
    name: Build and Upload Native Binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: corgea
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: corgea
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: corgea
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: corgea
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: corgea
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: corgea.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive Binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zip -j "corgea-${{ matrix.target }}.zip" \
            "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"

      - name: Archive Binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" `
            -DestinationPath "corgea-${{ matrix.target }}.zip" `
            -Force

      - name: Upload to GitHub Release (tags)
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
          files: "corgea-${{ matrix.target }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as Artifact (branches)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.tag == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: "corgea-${{ matrix.target }}.zip"

  finalize-release:
    name: Finalize GitHub Release Metadata
    needs: native-binaries
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Compose prerelease disclaimer
        id: body
        if: contains(inputs.tag || github.ref_name, '-')
        shell: bash
        env: { TAG: "${{ inputs.tag || github.ref_name }}" }
        run: |
          {
            echo "body<<__EOF__"
            echo "> [!WARNING]"
            echo "> **Beta pre-release (\`$TAG\`)** — actively developed, expect breaking changes."
            echo ">"
            echo "> - npm: \`npm install -g @corgea/cli@beta\`"
            echo "> - pip: \`pip install --pre corgea-cli\`"
            echo ">"
            echo "> Changes: see CHANGELOG.md · Issues: https://github.com/Corgea/cli/issues"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
      - name: Set release metadata (once)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
          generate_release_notes: true
          body: ${{ steps.body.outputs.body || '' }}
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
