name: Dogfood — corgea deps --check-cve

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/**'
      - 'fixtures/deps/**'
      - 'Cargo.lock'
      - '.github/workflows/dogfood-check-cve.yml'

env:
  CORGEA_TOKEN: ci-stub-token
  CORGEA_NPM_REGISTRY: http://127.0.0.1:1

jobs:
  vulnerable-fixture-blocks-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bin corgea --bin vuln-api-stub
      - name: Start vuln-api stub
        run: |
          ./target/release/vuln-api-stub --fixtures fixtures/deps/vuln-api-stub.json --print-url > stub.url &
          echo "CORGEA_VULN_API_URL=$(cat stub.url)" >> "$GITHUB_ENV"
          sleep 1
      - name: Run against vulnerable fixture; expect exit 1
        run: |
          set +e
          ./target/release/corgea deps --check-cve --fail-cve --path fixtures/deps/npm
          rc=$?
          if [ "$rc" -ne 1 ]; then
            echo "expected exit 1, got $rc"
            exit 1
          fi

  clean-fixture-passes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bin corgea --bin vuln-api-stub
      - name: Start vuln-api stub
        run: |
          ./target/release/vuln-api-stub --fixtures fixtures/deps/vuln-api-stub.json --print-url > stub.url &
          echo "CORGEA_VULN_API_URL=$(cat stub.url)" >> "$GITHUB_ENV"
          sleep 1
      - name: Run against clean fixture; expect exit 0
        run: ./target/release/corgea deps --check-cve --fail-cve --path fixtures/deps/npm-clean
