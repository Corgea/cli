name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x86:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86

    steps:
      - uses: actions/checkout@v6
      - name: Prepare resilient maturin download for manylinux Docker
        run: |
          bin_dir="${RUNNER_TEMP}/maturin-docker-bin"
          mkdir -p "$bin_dir"
          cat > "$bin_dir/curl" <<'EOF'
          #!/bin/bash
          set -euo pipefail
          if [[ " $* " == *" PyO3/maturin/releases "* ]]; then
            exec /usr/bin/curl --fail --retry 5 --retry-delay 3 --retry-all-errors "$@"
          fi
          exec /usr/bin/curl "$@"
          EOF
          chmod +x "$bin_dir/curl"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
          docker-options: -v ${{ runner.temp }}/maturin-docker-bin/curl:/usr/local/bin/curl:ro
          before-script-linux: |
            # If we're running on rhel centos, install needed packages.
            if command -v yum &> /dev/null; then
                yum update -y && yum install -y perl-core openssl openssl-devel pkgconfig libatomic
            else
                # If we're running on debian-based system.
                apt update -y && apt-get install -y libssl-dev openssl pkg-config musl-tools
            fi
      - name: Assert manylinux wheel compatibility tags
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if ((${#wheels[@]} == 0)); then
            echo "No wheels found in dist/"
            exit 1
          fi
          for wheel in "${wheels[@]}"; do
            base=$(basename "$wheel")
            if [[ "$base" == *manylinux_2_3[0-9]* ]]; then
              echo "Wheel tag too new for broad Linux support: $base"
              exit 1
            fi
            if [[ ! "$base" =~ manylinux2014 ]]; then
              echo "Expected manylinux2014 compatibility tag, got: $base"
              exit 1
            fi
            echo "OK: $base"
          done
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@v6
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [linux-x86, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
